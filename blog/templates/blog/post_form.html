{% extends 'blog/base.html' %}

{% block title %}Post Form{% endblock %}

{% block content %}

<h2>Create / Edit Post</h2>

<form method="post" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Save Post
    </button>

</form>

{% endblock %}
